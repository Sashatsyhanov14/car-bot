server {
    listen 80;
    server_name car.ticaretai.tr;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name car.ticaretai.tr;

    ssl_certificate /etc/letsencrypt/live/car.ticaretai.tr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/car.ticaretai.tr/privkey.pem;

    # Frontend
    location / {
        root /path/to/your/project/webapp/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend / API / Bot Webhook
    location /api {
        proxy_pass http://localhost:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
